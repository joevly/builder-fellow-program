  --blue:#2F99FF; --blue-2:#3984E1; --yellow:#FDDA02; --green:#07E27C; --red:#F04259;
  --ink:#FFFFFF; --muted:#aab2d0; --dim:#727aa0;
  --navy:#020518; --panel:rgba(255,255,255,.05); --line:rgba(255,255,255,.12);
  --accent:var(--blue);
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --disp:'Space Grotesk',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#000;overflow:hidden;font-family:var(--body);color:var(--ink)}
#viewport{position:fixed;inset:0;display:grid;place-items:center;background:#000}
#stage{
  position:absolute;top:50%;left:50%;width:1920px;height:1080px;
  transform:translate(-50%,-50%) scale(var(--s,1));
  background-image:var(--bg);background-size:100% 100%;background-repeat:no-repeat;
}

/* ---------- slide shell ---------- */
.slide{position:absolute;inset:0;padding:150px 132px 92px;opacity:0;visibility:hidden;
  transition:opacity .42s ease, transform .42s ease;transform:translateX(34px);
  display:flex;flex-direction:column;justify-content:center}
.slide.active{opacity:1;visibility:visible;transform:none;z-index:2}
.slide.prev{transform:translateX(-34px)}
.slide.top{justify-content:flex-start}
.slide.imgslide{padding:0}
.slide.imgslide .fullimg{position:absolute;inset:0;background:var(--s1bg);background-size:100% 100%;background-repeat:no-repeat}
@media (prefers-reduced-motion:reduce){.slide{transition:opacity .2s;transform:none!important}}

/* block accents */
.blk1{--accent:var(--blue)} .blk2{--accent:var(--yellow)} .blk3{--accent:var(--green)}
.blk4{--accent:var(--blue)} .blk5{--accent:var(--red)} .blk6{--accent:var(--green)}

/* ---------- type ---------- */
.eyebrow{font-family:var(--mono);font-size:22px;letter-spacing:.30em;text-transform:uppercase;
  color:var(--accent);display:flex;align-items:center;gap:16px;margin-bottom:26px;font-weight:500}
.eyebrow::before{content:"";width:40px;height:3px;background:var(--accent);box-shadow:0 0 16px var(--accent)}
h1{font-family:var(--disp);font-weight:700;font-size:98px;line-height:1.02;letter-spacing:-.02em}
h2{font-family:var(--disp);font-weight:700;font-size:70px;line-height:1.06;letter-spacing:-.018em;margin-bottom:18px}
h3{font-family:var(--disp);font-weight:600;font-size:33px;letter-spacing:-.01em}
.lead{font-size:33px;line-height:1.5;color:var(--muted);max-width:1320px;margin-top:14px}
.en{font-family:var(--mono);color:var(--accent);font-weight:500}
.hl{color:var(--accent)}
b,strong{font-weight:700;color:#fff}
.small{font-size:21px;color:var(--dim)}

/* ---------- panels & cards ---------- */
.row{display:flex;gap:30px}
.col{display:flex;flex-direction:column;gap:20px}
.grid{display:grid;gap:26px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:30px 32px;backdrop-filter:blur(2px)}
.card .k{font-family:var(--mono);font-size:18px;letter-spacing:.10em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;font-weight:600}
.card p{font-size:25px;line-height:1.5;color:var(--muted)}
.card.accent{border-color:color-mix(in srgb,var(--accent) 55%,transparent);
  box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 18%,transparent), 0 18px 60px -30px var(--accent)}
.ic{font-size:38px;margin-bottom:12px;display:block}
.tag{display:inline-flex;align-items:center;gap:11px;font-family:var(--mono);font-size:20px;
  padding:11px 20px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:rgba(255,255,255,.03)}
.tag .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
ul.clean{list-style:none;display:flex;flex-direction:column;gap:18px}
ul.clean li{font-size:28px;line-height:1.42;color:var(--muted);display:flex;gap:18px;align-items:flex-start}
ul.clean li::before{content:"";flex:0 0 12px;height:12px;margin-top:13px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 12px var(--accent)}
ul.clean li.no::before{background:var(--red);box-shadow:0 0 12px var(--red)}
ul.clean li.yes::before{background:var(--green);box-shadow:0 0 12px var(--green)}
.num{font-family:var(--mono);font-weight:700;font-size:18px;color:var(--accent);
  border:1px solid color-mix(in srgb,var(--accent) 45%,transparent);border-radius:9px;padding:4px 11px;letter-spacing:.06em}
.kbd{font-family:var(--mono);font-size:17px;background:rgba(255,255,255,.07);border:1px solid var(--line);
  border-bottom-width:2px;border-radius:8px;padding:4px 11px;color:#dfe5ff}
.callout{border-left:4px solid var(--accent);padding:18px 28px;background:rgba(255,255,255,.03);
  border-radius:0 14px 14px 0;font-size:26px;color:var(--muted);line-height:1.5}
.warn{--accent:var(--red)} .warn .eyebrow,.warn .k{color:var(--red)}
.stat{font-family:var(--disp);font-weight:700;font-size:54px;line-height:1;color:#fff}
.stat .u{font-size:24px;color:var(--accent);font-weight:600;font-family:var(--mono)}

/* ---------- cover ---------- */
.cover .kick{font-family:var(--mono);font-size:24px;letter-spacing:.36em;color:var(--blue);text-transform:uppercase;margin-bottom:30px}
.cover h1{font-size:128px}
.cover .sub{font-size:40px;color:var(--muted);margin-top:28px;font-weight:400}
.cover .strip{display:flex;gap:12px;margin-top:52px}
.cover .strip i{width:78px;height:9px;border-radius:7px;display:block}
.metarow{display:flex;gap:34px;margin-top:46px;align-items:center;color:var(--dim);font-family:var(--mono);font-size:22px}

/* ---------- timeline ---------- */
.timeline{display:flex;gap:0;margin-top:54px;position:relative}
.timeline .seg{flex:1;position:relative;padding:0 8px}
.timeline .seg .node{width:26px;height:26px;border-radius:50%;background:#0b1024;border:3px solid var(--dim);margin-bottom:26px}
.timeline .seg.on .node{background:var(--accent);border-color:var(--accent);box-shadow:0 0 22px var(--accent)}
.timeline .seg .line{position:absolute;top:11px;left:50%;right:-50%;height:3px;background:rgba(255,255,255,.14)}
.timeline .seg:last-child .line{display:none}
.timeline .seg .s{font-family:var(--mono);font-size:20px;color:var(--accent);letter-spacing:.08em;font-weight:600}
.timeline .seg .t{font-size:24px;margin-top:10px;color:#cfd6f5;font-weight:600;line-height:1.25}
.timeline .seg.dim .t{color:var(--dim)}
.timeline .seg.on .t{color:#fff}

/* ---------- chrome ---------- */
#prog{position:fixed;left:0;top:0;height:4px;background:var(--blue);z-index:40;transition:width .4s ease;box-shadow:0 0 14px var(--blue)}
#count{position:fixed;left:22px;bottom:16px;font-family:var(--mono);font-size:15px;color:var(--dim);z-index:40;letter-spacing:.10em}
#hint{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);font-family:var(--mono);font-size:14px;color:var(--dim);z-index:40;
  letter-spacing:.06em;transition:opacity .6s;background:rgba(0,0,0,.4);padding:6px 14px;border-radius:9px}
#hint.hide{opacity:0}
#hint .kbd{font-size:13px;padding:3px 8px}

/* presenter */
#presenter{position:fixed;left:0;right:0;bottom:0;z-index:60;background:rgba(4,6,14,.97);border-top:2px solid var(--blue);
  display:none;grid-template-columns:1fr 340px;gap:30px;padding:22px 32px;backdrop-filter:blur(8px);max-height:40vh}
#presenter.on{display:grid}
#presenter .notes{overflow:auto;font-size:18px;line-height:1.55;color:#cdd4f0}
#presenter .notes h4{font-family:var(--mono);font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--blue);margin-bottom:10px}
#presenter .notes b{color:var(--yellow)}
#presenter .side{border-left:1px solid var(--line);padding-left:24px;display:flex;flex-direction:column;gap:16px}
#presenter .timer{font-family:var(--mono);font-size:54px;font-weight:700;color:#fff;line-height:1}
#presenter .target{font-family:var(--mono);font-size:14px;color:var(--dim)}
#presenter .next{font-size:16px;color:var(--muted)} #presenter .next b{color:#fff;font-weight:600}
#presenter .tbtns{display:flex;gap:9px}
#presenter .tbtns button{font-family:var(--mono);font-size:14px;cursor:pointer;background:rgba(255,255,255,.06);
  color:#fff;border:1px solid var(--line);border-radius:9px;padding:8px 14px}

/* overview */
#overview{position:fixed;inset:0;z-index:70;background:rgba(2,3,10,.96);display:none;padding:60px 70px;overflow:auto}
#overview.on{display:block}
#overview h4{font-family:var(--mono);letter-spacing:.2em;color:var(--blue);margin-bottom:24px;font-size:16px;text-transform:uppercase}
.ovgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.ovcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 17px;cursor:pointer;transition:.15s}
.ovcard:hover{border-color:var(--blue);background:rgba(47,153,255,.08)}
.ovcard .on-i{font-family:var(--mono);font-size:13px;color:var(--dim)}
.ovcard .ot{font-size:17px;font-weight:600;margin-top:5px;color:#dfe5ff;line-height:1.25}
.ovcard .ob{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--blue);text-transform:uppercase;margin-top:6px}

/* ---------- code ---------- */
pre.scode{font-family:var(--mono);font-size:24px;line-height:1.6;background:rgba(2,6,16,.72);
  border:1px solid var(--line);border-radius:16px;padding:24px 28px;white-space:pre;overflow:auto;color:#e3ebff;margin:0}
pre.scode.sm{font-size:20px;line-height:1.5;padding:20px 24px}
pre.scode .cm{color:#5d7095;font-style:italic}
pre.scode .kw{color:#7cc4ff}.scode .ty{color:#5be0a0}.scode .st{color:#ffd470}
pre.scode .nu{color:#ff9e7a}.scode .fn{color:#c9a8ff}

/* ---------- compare table ---------- */
.cmp{width:100%;border-collapse:collapse;font-size:27px;margin-top:18px}
.cmp th,.cmp td{padding:15px 22px;text-align:left;border-bottom:1px solid var(--line)}
.cmp th{font-family:var(--mono);font-size:19px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}
.cmp td.kc{color:#fff;font-weight:600}.cmp .a1{color:var(--muted)}.cmp .a2{color:var(--green);font-weight:600}
.cmp .x{color:var(--red);font-weight:600}.cmp .ok{color:var(--green);font-weight:600}

/* ---------- flow ---------- */
.flow2{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:34px}
.flow2 .st{flex:1;min-width:140px;text-align:center;padding:22px 10px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.03)}
.flow2 .st .i{font-family:var(--mono);font-size:30px;color:var(--accent)}
.flow2 .st .n{font-family:var(--disp);font-weight:600;font-size:22px;margin-top:6px}
.flow2 .st .d{font-size:17px;color:var(--muted);margin-top:4px}
.flow2 .ar{color:var(--dim);font-size:26px;flex:0 0 auto}
.tagrow{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}

/* ---------- interactive: two-column explorer (erc20 + tx) ---------- */
.exwrap{display:grid;grid-template-columns:1.02fr .98fr;gap:36px;margin-top:24px}
.exlist{background:#05070f;border:1px solid var(--line);border-radius:18px;padding:22px 22px;font-family:var(--mono);font-size:23px;line-height:1.5}
.exlist .frow{cursor:pointer;border-radius:10px;padding:9px 14px;transition:background .15s;display:flex;gap:12px;align-items:baseline}
.exlist .frow:hover{background:rgba(255,255,255,.05)}
.exlist .frow.on{background:color-mix(in srgb,var(--accent) 16%,transparent);box-shadow:inset 4px 0 0 var(--accent)}
.exlist .fk{color:var(--blue);font-weight:600}.exlist .fp{color:var(--dim)}.exlist .ev{color:var(--yellow)}
.exinfo{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:36px 38px;display:flex;flex-direction:column;justify-content:center}
.exinfo .ik{font-family:var(--mono);color:var(--accent);font-size:22px;letter-spacing:.04em;margin-bottom:14px;font-weight:600}
.exinfo h3{margin-bottom:16px;font-size:38px}
.exinfo p{font-size:26px;line-height:1.5;color:var(--muted)}
.exinfo .hint{margin-top:20px;font-size:18px;color:var(--dim);font-family:var(--mono)}

/* ---------- interactive: approve flow ---------- */
.afwrap{margin-top:24px;display:grid;grid-template-columns:1fr;gap:24px}
.afsteps{display:flex;gap:14px}
.afstep{flex:1;cursor:pointer;border:1px solid var(--line);border-radius:16px;padding:20px 22px;background:rgba(255,255,255,.03);transition:.18s}
.afstep .sn{font-family:var(--mono);font-size:17px;color:var(--dim);letter-spacing:.08em}
.afstep .stt{font-family:var(--disp);font-weight:600;font-size:25px;margin-top:8px;color:#cfd6f5}
.afstep.on{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,transparent)}
.afstep.on .sn{color:var(--accent)} .afstep.on .stt{color:#fff}
.afstep.done{border-color:color-mix(in srgb,var(--green) 50%,transparent)}
.afbody{display:grid;grid-template-columns:1.1fr .9fr;gap:30px;align-items:stretch}
.afstate{background:#05070f;border:1px solid var(--line);border-radius:18px;padding:30px 34px;display:flex;flex-direction:column;gap:20px;justify-content:center}
.afstate .stt{font-family:var(--mono);font-size:18px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase}
.afstate .row3{display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid var(--line);padding-bottom:14px}
.afstate .row3:last-child{border-bottom:none;padding-bottom:0}
.afstate .lk{font-size:23px;color:var(--muted)}
.afstate .vv{font-family:var(--mono);font-size:30px;color:#fff;font-weight:600}
.afstate .vv.gr{color:var(--green)} .afstate .vv.yl{color:var(--yellow)} .afstate .vv.rd{color:var(--red)}
.afinfo{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:32px 36px;display:flex;flex-direction:column;justify-content:center}
.afinfo h3{font-size:32px;margin-bottom:14px}
.afinfo p{font-size:25px;line-height:1.5;color:var(--muted)}
.afbtns{display:flex;gap:14px;margin-top:6px}
.afbtns button{font-family:var(--mono);font-size:20px;cursor:pointer;background:rgba(255,255,255,.05);
  color:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 24px;transition:.15s}
.afbtns button:hover{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,transparent)}

/* ---------- interactive: error gas ---------- */
.egwrap{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:24px}
.egcard{background:#05070f;border:2px solid var(--line);border-radius:20px;padding:30px 34px;transition:.2s;cursor:pointer}
.egcard.on{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 18px 60px -30px var(--accent)}
.egcard .et{font-family:var(--disp);font-weight:600;font-size:30px;margin-bottom:8px}
.egcard .ed{font-family:var(--mono);font-size:19px;color:var(--dim);margin-bottom:18px}
.egcard pre{font-family:var(--mono);font-size:20px;line-height:1.5;color:#e3ebff;white-space:pre-wrap;margin-bottom:20px}
.egbar{height:34px;border-radius:9px;background:rgba(255,255,255,.07);overflow:hidden;position:relative}
.egbar i{display:block;height:100%;border-radius:9px;transition:width .5s ease}
.egcard.a .egbar i{background:linear-gradient(90deg,var(--red),#ff7a89)}
.egcard.b .egbar i{background:linear-gradient(90deg,var(--green),#5dffb0)}
.egstat{display:flex;justify-content:space-between;margin-top:16px;align-items:baseline}
.egstat .g{font-family:var(--disp);font-weight:700;font-size:38px;color:#fff}
.egstat .gl{font-family:var(--mono);font-size:17px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase}

/* ---------- interactive: decimals lab ---------- */
.dlab{background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
  border:1px solid var(--line);border-radius:22px;padding:34px 40px;margin-top:24px}
.dlab .lbl{font-family:var(--mono);font-size:17px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;display:block;font-weight:600}
.dfield{width:100%;background:#05070f;border:1px solid var(--line);border-radius:14px;color:#fff;
  font-family:var(--mono);font-size:30px;padding:18px 22px;outline:none}
.dfield:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 22%,transparent)}
.dpresets{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px}
.dpreset{font-family:var(--mono);font-size:19px;cursor:pointer;border:1px solid var(--line);background:rgba(255,255,255,.03);
  color:var(--muted);border-radius:12px;padding:12px 18px;transition:.15s}
.dpreset.on{border-color:var(--accent);color:#fff;background:color-mix(in srgb,var(--accent) 14%,transparent)}
.draw{font-family:var(--mono);font-size:34px;color:var(--green);word-break:break-all;line-height:1.4}
.dnote{font-family:var(--mono);font-size:20px;color:var(--muted);margin-top:6px}
.dnote b{color:var(--yellow)}

/* ---------- chips picker (arrays vs mappings) ---------- */
.chips{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px}
.chip{font-family:var(--mono);font-size:21px;cursor:pointer;border:1px solid var(--line);background:rgba(255,255,255,.03);
  color:var(--muted);border-radius:12px;padding:13px 20px;transition:.15s}
.chip.on{border-color:var(--accent);color:#fff;background:color-mix(in srgb,var(--accent) 14%,transparent)}
.recbox{background:#05070f;border:1px solid var(--line);border-radius:18px;padding:28px 32px;margin-top:20px;display:flex;flex-direction:column;justify-content:center;min-height:150px}
.recbox .rpill{display:inline-flex;align-items:center;gap:10px;font-family:var(--mono);font-size:22px;font-weight:700;
  padding:8px 18px;border-radius:999px;width:fit-content;margin-bottom:14px}
.recbox p{font-size:25px;color:var(--muted);line-height:1.5}

.hands{display:flex;flex-direction:column;gap:22px;counter-reset:step}
.hstep{display:flex;gap:22px;align-items:flex-start}
.hstep .hn{flex:0 0 56px;height:56px;border-radius:14px;display:grid;place-items:center;font-family:var(--disp);font-weight:700;font-size:28px;
  color:var(--accent);border:2px solid color-mix(in srgb,var(--accent) 50%,transparent);background:rgba(255,255,255,.03)}
.hstep .ht{font-size:30px;line-height:1.4;color:#dfe5ff;padding-top:8px}
.hstep .ht b{color:#fff} .hstep .ht .kbd{font-size:21px}
</style>
</head>

/* 7 */
{blk:2,bn:"BLOK 2 · DATA STRUCTURES",cls:"top",t:"Arrays vs Mappings",
 html:`<div class="eyebrow">Pilih yang tepat — paham gas trade-off</div>
   <h2>Array vs Mapping: <span class="hl">"iterate" atau "lookup"?</span></h2>
   <div class="row" style="gap:34px;align-items:flex-start">
     <table class="cmp" style="flex:1.15">
       <thead><tr><th>Aspek</th><th>Array</th><th>Mapping</th></tr></thead>
       <tbody>
         <tr><td class="kc">Lookup by key</td><td class="x">O(n) iterasi</td><td class="ok">O(1) instan</td></tr>
         <tr><td class="kc">Iterasi semua</td><td class="ok">native loop</td><td class="x">tidak bisa</td></tr>
         <tr><td class="kc">Tahu jumlah</td><td class="ok">.length</td><td class="x">manual counter</td></tr>
         <tr><td class="kc">Default value</td><td class="a1">slot terisi</td><td class="ok">zero-value</td></tr>
         <tr><td class="kc">Gas tambah data</td><td class="a1">variable</td><td class="ok">konstan</td></tr>
       </tbody></table>
     <div class="col" style="flex:.85">

/* 8 */
{blk:2,bn:"BLOK 2 · GAS BOMB",cls:"",t:"Pull over Push",cardwarn:true,
 html:`<div class="eyebrow" style="color:var(--red)">&#9888; Iteration Gas Bomb</div>
   <h2>Loop sepanjang array = <span style="color:var(--red)">undangan DoS</span></h2>
   <div class="row" style="margin-top:24px;gap:30px;align-items:stretch">
     <div class="col" style="flex:1">
       <pre class="scode sm" style="border-color:color-mix(in srgb,var(--red) 45%,transparent)">// BAD — rentan DoS
function distributeRewards() external {
    for (uint i = 0; i < users.length; i++) {
        users[i].transfer(amount);
    }
}</pre>
       <ul class="clean" style="font-size:23px">
         <li class="no">Gas naik linear dengan <b>users.length</b></li>
         <li class="no">10.000 user? Tx <b>out-of-gas</b> → gagal selamanya</li>
         <li class="no">Attacker daftar banyak address → contract <b>macet</b></li>
       </ul>
     </div>
     <div class="col" style="flex:1">
       <pre class="scode sm" style="border-color:color-mix(in srgb,var(--green) 45%,transparent)">// GOOD — user klaim sendiri
mapping(address => uint256) public rewards;

function claim() external {
    uint256 r = rewards[msg.sender];
    rewards[msg.sender] = 0;
    payable(msg.sender).transfer(r);
}</pre>
       <div class="callout" style="--accent:var(--green)"><b style="color:var(--green)">Pull &gt; Push, selalu.</b> Geser kerja (dan biaya gas) ke masing-masing user. Classic exploit: King of the Ether DoS.</div>
     </div>
   </div>`,
 notes:`⚠️ Security teaser untuk Sesi 4. Tegaskan pull > push selalu. Real exploit: King of the Ether classic DoS attack.`},

{blk:2,bn:"BLOK 2 · STRUCT",cls:"",t:"Struct + Packing",
 html:`<div class="eyebrow">Kelompokkan data yang berhubungan</div>
   <h2>Struct — satu nama untuk banyak field <span class="hl">+ trik packing gas</span></h2>
   <div class="row" style="margin-top:24px;gap:30px;align-items:flex-start">
     <pre class="scode sm" style="flex:1.05">struct User {
    string name;
    uint256 balance;
    bool isActive;
    uint256 registeredAt;
}
mapping(address => User) public users;</pre>
     <div class="col" style="flex:.95">
       <div class="card"><div class="k" style="color:var(--yellow)">&#9888; Gas tip — urutan field penting</div>
       <pre class="scode sm" style="font-size:18px;margin-top:6px">// BAD — 4 slot
uint128 a; uint256 b; uint128 c; uint256 d;
// GOOD — 3 slot (a+c dipack jadi 1 slot)
uint128 a; uint128 c; uint256 b; uint256 d;</pre>
       <p style="font-size:22px;margin-top:14px;color:var(--muted)">Tiap storage slot = 32 byte. Field kecil yang berdekatan bisa <b>dipack</b> jadi satu slot → hemat gas.</p></div>
     </div>
   </div>`,
 notes:`Gas optimization 101. Audience coder akan appreciate ini — terasa pro tip-worthy. Tiap slot 32 byte, urutan field menentukan packing.`},

{blk:4,bn:"BLOK 4 · C3 LINEARIZATION",cls:"",t:"Multiple Inheritance",cardwarn:true,
 html:`<div class="eyebrow">virtual · override · super</div>
   <h2>Multiple inheritance — <span class="hl">kuat tapi hati-hati</span></h2>
   <div class="row" style="margin-top:24px;gap:30px;align-items:flex-start">
     <pre class="scode sm" style="flex:1.1">contract A { function foo() public virtual {} }
contract B is A { function foo() public virtual override {} }
contract C is A { function foo() public virtual override {} }

contract D is B, C {
    function foo() public override(B, C) {
        super.foo();   // C3: panggil C.foo() (kanan)
    }
}</pre>
     <div class="col" style="flex:.9">
       <div class="card"><ul class="clean" style="font-size:24px">
         <li class="yes"><b>virtual</b> — boleh di-override</li>

         <li class="yes"><b>super</b> — panggil induk (urutan C3)</li></ul></div>
       <div class="callout warn"><b style="color:var(--red)">Hati-hati.</b> Banyak audit finding lahir dari inheritance yang salah. Jangan deep-dive C3 — cukup paham bahayanya.</div>

/* ============ render + navigation ============ */
const stage=document.getElementById('stage');
SLIDES.forEach((s,i)=>{
  const el=document.createElement('section');
  el.className='slide blk'+s.blk+(s.cls?(' '+s.cls):'');
  el.dataset.i=i; el.innerHTML=s.html; stage.appendChild(el); s._el=el;
});
const slides=[...document.querySelectorAll('.slide')];

let cur=0;
function show(n){
  n=Math.max(0,Math.min(slides.length-1,n));
  slides.forEach((el,i)=>{el.classList.remove('active','prev'); if(i<n)el.classList.add('prev');});
  slides[n].classList.add('active'); cur=n;
  document.getElementById('prog').style.width=(n/(slides.length-1)*100)+'%';
  document.getElementById('count').textContent=String(n+1).padStart(2,'0')+' / '+String(slides.length).padStart(2,'0')+'  ·  '+SLIDES[n].bn;
  updatePresenter();
}
function next(){show(cur+1);} function prev(){show(cur-1);}

function scale(){document.documentElement.style.setProperty('--s',Math.min(window.innerWidth/1920,window.innerHeight/1080));}
window.addEventListener('resize',scale); scale();

/* keys — HANYA panah kiri/kanan yang navigasi.
   Space DIMATIKAN. Klik kiri/kanan layar TIDAK navigasi (tidak ada handler click).
   Semua shortcut diabaikan saat sedang mengetik di input/textarea. */
function editable(el){return el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.isContentEditable);}
document.addEventListener('keydown',e=>{
  if(editable(e.target)) return;
  if(e.code==='Space'||e.key===' '){ return; }            // SPACE sengaja dimatikan
  if(e.key==='ArrowRight'){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'){e.preventDefault();prev();}
  else if(e.key==='f'||e.key==='F'){toggleFs();}
  else if(e.key==='p'||e.key==='P'){togglePres();}
  else if(e.key==='o'||e.key==='O'){toggleOv();}
  else if(e.key==='Escape'){document.getElementById('overview').classList.remove('on');}
});
function toggleFs(){ if(!document.fullscreenElement){document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();} else {document.exitFullscreen&&document.exitFullscreen();} }

setTimeout(()=>document.getElementById('hint').classList.add('hide'),5200);
document.addEventListener('mousemove',()=>{const h=document.getElementById('hint');h.classList.remove('hide');clearTimeout(h._t);h._t=setTimeout(()=>h.classList.add('hide'),2600);});

/* presenter */
const pres=document.getElementById('presenter');
function togglePres(){pres.classList.toggle('on');updatePresenter();}
function updatePresenter(){
  if(!pres.classList.contains('on'))return;
  document.getElementById('pnotes').innerHTML='<h4>Catatan Pembicara · '+SLIDES[cur].t+'</h4>'+(SLIDES[cur].notes||'—');
  const nx=SLIDES[cur+1];
  document.getElementById('pnext').innerHTML=nx?('Berikutnya → <b>'+nx.t+'</b>'):'<b>Slide terakhir</b>';
}
let tEl=document.getElementById('ptimer'),tSec=0,tInt=null;
function tFmt(s){const h=Math.floor(s/3600),m=Math.floor(s%3600/60),x=s%60;return (h>0?h+':':'')+String(m).padStart(2,'0')+':'+String(x).padStart(2,'0');}
document.getElementById('tstart').onclick=()=>{if(!tInt)tInt=setInterval(()=>{tSec++;tEl.textContent=tFmt(tSec);},1000);};
document.getElementById('tpause').onclick=()=>{clearInterval(tInt);tInt=null;};
document.getElementById('treset').onclick=()=>{clearInterval(tInt);tInt=null;tSec=0;tEl.textContent='00:00';};

/* overview */
const ov=document.getElementById('overview'),ovg=document.getElementById('ovgrid');
SLIDES.forEach((s,i)=>{const c=document.createElement('div');c.className='ovcard';
  c.innerHTML='<div class="on-i">'+String(i+1).padStart(2,'0')+'</div><div class="ot">'+s.t+'</div><div class="ob">'+s.bn+'</div>';
  c.onclick=()=>{show(i);ov.classList.remove('on');};ovg.appendChild(c);});
function toggleOv(){ov.classList.toggle('on');}

  box.querySelectorAll('.chip').forEach(c=>c.onclick=()=>pick(c));
  pick(box.querySelector('.chip'));

/* ============ interactive: decimals lab ============ */
(function(){
  const amt=document.getElementById('dAmt'); if(!amt)return;
  const raw=document.getElementById('dRaw'),note=document.getElementById('dNote'),decBox=document.getElementById('dDec');
  let dec=18;
  function fmt(bi){ // group thousands
    const s=bi.toString(); return s.replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  }
  function calc(){
    let v=(amt.value||'').trim().replace(/[, ]/g,'');
    if(!/^\d*\.?\d*$/.test(v)||v===''||v==='.'){ raw.textContent='—'; note.textContent='Masukkan angka token.'; return; }
    let [ip,fp='']=v.split('.'); fp=fp.slice(0,dec);
    let digits=(ip+fp.padEnd(dec,'0')).replace(/^0+(?=\d)/,'');
    let bi; try{ bi=BigInt(digits||'0'); }catch(e){ raw.textContent='—'; return; }
    raw.textContent=fmt(bi);
    note.innerHTML='Di kode kamu menulis angka raksasa ini. Di MetaMask, ditampilkan jadi <b>'+ (v||'0') +'</b> karena di-bagi 10<sup>'+dec+'</sup> via <b>decimals</b>.';
  }
  decBox.querySelectorAll('.dpreset').forEach(b=>b.onclick=()=>{
    decBox.querySelectorAll('.dpreset').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); dec=+b.dataset.d; calc();
  });
  amt.addEventListener('input',calc); calc();
})();

show(0);

<script>
/* tiny Solidity highlighter for code blocks (escapes < and & first) */
(function(){
  var KW=/^(pragma|solidity|contract|interface|library|using|is|function|constructor|modifier|event|emit|return|returns|require|revert|error|if|else|for|memory|storage|calldata|indexed|public|private|internal|external|view|pure|payable|virtual|override|constant|immutable|mapping|struct|enum|new|import|super|ether|wei|gwei|days|hours|seconds|minutes|weeks|true|false)$/;
  var TY=/^(uint256|uint128|uint64|uint8|uint|int256|int|bool|address|bytes32|bytes4|bytes|string)$/;
  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;');}
  function hl(src){
    return esc(src).replace(/(\/\/[^\n]*)|("[^"]*")|\b(0x[0-9a-fA-F]+|\d[\d_]*(?:\.\d+)?)\b|([A-Za-z_]\w*)/g,
      function(m,c,s,n,id,off,full){
        if(c)return '<span class="cm">'+c+'</span>';
        if(s)return '<span class="st">'+s+'</span>';
        if(n!=null&&n!=='')return '<span class="nu">'+n+'</span>';
        if(id){
          if(KW.test(id))return '<span class="kw">'+id+'</span>';
          if(TY.test(id))return '<span class="ty">'+id+'</span>';
          if(/^\s*\(/.test(full.slice(off+id.length))&&id!=='if'&&id!=='for')return '<span class="fn">'+id+'</span>';
          return id;
        }
        return m;
      });
  }
  function run(){var ps=document.querySelectorAll('pre.scode');for(var i=0;i<ps.length;i++){var p=ps[i];if(p.dataset.hl)continue;p.dataset.hl='1';p.innerHTML=hl(p.textContent);}}
  run();
  try{new MutationObserver(run).observe(document.body,{childList:true,subtree:true});}catch(e){}
})();
</script>
