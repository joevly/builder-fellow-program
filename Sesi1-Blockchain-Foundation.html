  --blue:#2F99FF; --blue-2:#3984E1; --yellow:#FDDA02; --green:#07E27C; --red:#F04259;
  --ink:#FFFFFF; --muted:#aab2d0; --dim:#727aa0;
  --navy:#020518; --panel:rgba(255,255,255,.05); --line:rgba(255,255,255,.12);
  --accent:var(--blue);
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --disp:'Space Grotesk',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#000;overflow:hidden;font-family:var(--body);color:var(--ink)}
#viewport{position:fixed;inset:0;display:grid;place-items:center;background:#000}
#stage{
  position:absolute;top:50%;left:50%;width:1920px;height:1080px;
  transform:translate(-50%,-50%) scale(var(--s,1));
  background-image:var(--bg);background-size:100% 100%;background-repeat:no-repeat;
}

/* ---------- slide shell ---------- */
.slide{position:absolute;inset:0;padding:150px 132px 92px;opacity:0;visibility:hidden;
  transition:opacity .42s ease, transform .42s ease;transform:translateX(34px);
  display:flex;flex-direction:column;justify-content:center}
.slide.active{opacity:1;visibility:visible;transform:none;z-index:2}
.slide.prev{transform:translateX(-34px)}
.slide.top{justify-content:flex-start}
.slide.imgslide{padding:0}
.slide.imgslide .fullimg{position:absolute;inset:0;background:var(--s1bg);background-size:100% 100%;background-repeat:no-repeat}
@media (prefers-reduced-motion:reduce){.slide{transition:opacity .2s;transform:none!important}}

/* block accents */
.blk1{--accent:var(--blue)} .blk2{--accent:var(--yellow)} .blk3{--accent:var(--green)}
.blk4{--accent:var(--blue)} .blk5{--accent:var(--red)} .blk6{--accent:var(--green)}

/* ---------- type ---------- */
.eyebrow{font-family:var(--mono);font-size:22px;letter-spacing:.30em;text-transform:uppercase;
  color:var(--accent);display:flex;align-items:center;gap:16px;margin-bottom:26px;font-weight:500}
.eyebrow::before{content:"";width:40px;height:3px;background:var(--accent);box-shadow:0 0 16px var(--accent)}
h1{font-family:var(--disp);font-weight:700;font-size:98px;line-height:1.02;letter-spacing:-.02em}
h2{font-family:var(--disp);font-weight:700;font-size:74px;line-height:1.05;letter-spacing:-.018em;margin-bottom:18px}
h3{font-family:var(--disp);font-weight:600;font-size:33px;letter-spacing:-.01em}
.lead{font-size:33px;line-height:1.5;color:var(--muted);max-width:1320px;margin-top:14px}
.en{font-family:var(--mono);color:var(--accent);font-weight:500}
.hl{color:var(--accent)}
b,strong{font-weight:700;color:#fff}
.small{font-size:21px;color:var(--dim)}

/* ---------- panels & cards ---------- */
.row{display:flex;gap:30px}
.col{display:flex;flex-direction:column;gap:20px}
.grid{display:grid;gap:26px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:32px 34px;backdrop-filter:blur(2px)}
.card .k{font-family:var(--mono);font-size:18px;letter-spacing:.10em;text-transform:uppercase;color:var(--accent);margin-bottom:14px;font-weight:600}
.card p{font-size:25px;line-height:1.5;color:var(--muted)}
.card.accent{border-color:color-mix(in srgb,var(--accent) 55%,transparent);
  box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 18%,transparent), 0 18px 60px -30px var(--accent)}
.ic{font-size:38px;margin-bottom:12px;display:block}
.tag{display:inline-flex;align-items:center;gap:11px;font-family:var(--mono);font-size:20px;
  padding:11px 20px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:rgba(255,255,255,.03)}
.tag .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}

/* ============ pure-JS SHA-256 ============ */
function sha256(ascii){
  function rr(v,a){return (v>>>a)|(v<<(32-a));}
  var maxWord=Math.pow(2,32),i,j,result='';var words=[];
  var bitLen=ascii.length*8;
  var hash=sha256.h=sha256.h||[];var k=sha256.k=sha256.k||[];
  var pc=k.length;var comp={};
  for(var c=2;pc<64;c++){if(!comp[c]){for(i=0;i<313;i+=c)comp[i]=c;
    hash[pc]=(Math.pow(c,.5)*maxWord)|0;k[pc++]=(Math.pow(c,1/3)*maxWord)|0;}}
  ascii+='\x80';while(ascii.length%64-56)ascii+='\x00';
  for(i=0;i<ascii.length;i++){j=ascii.charCodeAt(i);if(j>>8)return;words[i>>2]|=j<<((3-i)%4)*8;}
  words[words.length]=((bitLen/maxWord)|0);words[words.length]=(bitLen);
  for(j=0;j<words.length;){var w=words.slice(j,j+=16);var oh=hash;hash=hash.slice(0,8);
    for(i=0;i<64;i++){var w15=w[i-15],w2=w[i-2],a=hash[0],e=hash[4];
      var t1=hash[7]+(rr(e,6)^rr(e,11)^rr(e,25))+((e&hash[5])^((~e)&hash[6]))+k[i]
        +(w[i]=(i<16)?w[i]:(w[i-16]+(rr(w15,7)^rr(w15,18)^(w15>>>3))+w[i-7]+(rr(w2,17)^rr(w2,19)^(w2>>>10)))|0);
      var t2=(rr(a,2)^rr(a,13)^rr(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(t1+t2)|0].concat(hash);hash[4]=(hash[4]+t1)|0;}
    for(i=0;i<8;i++)hash[i]=(hash[i]+oh[i])|0;}
  for(i=0;i<8;i++)for(j=3;j+1;j--){var b=(hash[i]>>(j*8))&255;result+=((b<16)?0:'')+b.toString(16);}
  return result;
}
function h256(s){return sha256(unescape(encodeURIComponent(String(s))));}

   <div class="grid g2" style="margin-top:36px">

     <div class="card accent"><div class="k">Tantangan puluhan tahun</div><p>Bisakah kita selesaikan <b>double-spending</b> <i>tanpa</i> wasit tunggal? Sampai 2008, jawabannya: belum bisa.</p></div>
   </div>`,
 notes:`Setup kenapa Satoshi penting. Masalahnya bukan "enkripsi" — tapi "siapa yang pegang buku besar yang benar". Jangan deep-dive.`},

{blk:2,bn:"BLOK 2 · WHY WEB3 EXISTS",cls:"",t:"Satoshi 2008",
 html:`<div class="eyebrow">Terobosan · 2008</div>
   <h2>Bitcoin menyelesaikan double-spending<br><span class="hl">tanpa otoritas pusat</span></h2>
   <div class="row" style="margin-top:36px;gap:30px;align-items:stretch">
     <div class="card" style="flex:1.3"><div class="k">Idenya</div><p>Buku besar tidak dipegang satu pihak — <b>disebar & direplikasi</b> ke ribuan komputer. Aturan matematika yang memutuskan transaksi mana yang valid.</p></div>
     <div class="card accent" style="flex:1;justify-content:center;display:flex;flex-direction:column"><div class="stat">9 hal.</div><p style="margin-top:10px">Whitepaper Bitcoin, Okt 2008. Cukup 9 halaman untuk memulai industri triliunan dolar.</p></div>
   </div>`,
 notes:`Singkat. Jangan jadi kuliah sejarah. 1 masalah lama, 1 solusi elegan, 1 dokumen. Lanjut.`},

{blk:2,bn:"BLOK 2 · WHY WEB3 EXISTS",cls:"",t:"Web1 → Web2 → Web3",
 html:`<div class="eyebrow">Evolusi Internet</div>
   <h2>Bukan menggantikan Web2 — <span class="hl">menambah ownership</span></h2>
   <div class="grid g3" style="margin-top:40px">
     <div class="card"><div class="k">Web1 · 1990an</div><h3 style="margin-bottom:14px">Read</h3><p>Situs statis, brosur digital. Kontrol: <b>pemilik website</b>.<br><span class="small">Contoh: portal berita lama</span></p></div>
     <div class="card"><div class="k">Web2 · 2004</div><h3 style="margin-bottom:14px">Read · Write</h3><p>Interaktif, tapi data & akunmu dipegang <b>Big Tech</b>.<br><span class="small">Contoh: Facebook, YouTube, IG</span></p></div>
     <div class="card accent"><div class="k">Web3 · 2014→</div><h3 style="margin-bottom:14px">Read · Write · <span class="hl">Own</span></h3><p>Kamu pegang aset & identitas via <span class="en">wallet</span>. Kontrol: <b>pengguna/komunitas</b>.<br><span class="small">Contoh: DeFi, NFT</span></p></div>
   </div>`,
 notes:`Frame sebagai ownership shift, bukan "Web2 mati". Kata kunci: read → write → own. Audience coder benci hype — tetap rasional.`},

{blk:2,bn:"BLOK 2 · WHY WEB3 EXISTS",cls:"",t:"Real Use Cases",
 html:`<div class="eyebrow">Bukan Hype — Angka Nyata</div>
   <h2>Yang sudah jalan hari ini</h2>
   <div class="grid g4" style="margin-top:36px">
     <div class="card"><span class="ic">💰</span><div class="k">DeFi</div><div class="stat" style="font-size:40px">$50B+ <span class="u">TVL</span></div><p style="margin-top:10px">Pinjam-meminjam tanpa bank.</p></div>
     <div class="card"><span class="ic">🌍</span><div class="k">Cross-border</div><div class="stat" style="font-size:40px">~30 <span class="u">detik</span></div><p style="margin-top:10px">Kirim USDC global, fee &lt; $1.</p></div>
     <div class="card"><span class="ic">🪪</span><div class="k">Ownership</div><div class="stat" style="font-size:40px">ENS</div><p style="margin-top:10px">NFT: domain, item in-game.</p></div>
     <div class="card"><span class="ic">🏛️</span><div class="k">DAO</div><div class="stat" style="font-size:40px">on-chain</div><p style="margin-top:10px">Governance & treasury bersama.</p></div>
   </div>
   <div class="callout" style="margin-top:36px">Paling kuat: <b>negara dengan inflasi tinggi & akses bank rendah</b> justru adopsi tertinggi. Solusi nyata, bukan sekadar spekulasi.</div>`,
 notes:`Pakai contoh konkret + angka. "Adopsi tertinggi di Nigeria/Argentina" lebih kuat dari "masa depan desentralisasi". Angka TVL bisa berubah — cek terbaru jika sempat.`},

{blk:2,bn:"BLOK 2 · WHY WEB3 EXISTS",cls:"warn",t:"What Web3 is NOT",
 html:`<div class="eyebrow">Pandangan Jujur</div>
   <h2>Apa yang Web3 <span style="color:var(--red)">BUKAN</span></h2>
   <div class="row" style="margin-top:36px;gap:50px">
     <ul class="clean" style="flex:1">
       <li class="no">Bukan solusi untuk semua masalah</li>
       <li class="no">Bukan jaminan kaya cepat</li>
       <li class="no">Bukan teknologi yang sudah matang</li>
       <li class="no">Bukan pengganti database untuk semua kasus</li>
     </ul>
     <ul class="clean" style="flex:1">
       <li class="yes"><b>Tapi:</b> industri muda, ruang besar untuk early builders</li>
       <li class="yes">Skill langka → leverage karier yang nyata</li>
       <li class="yes">Kamu masuk lebih awal dari 99% developer</li>
     </ul>
   </div>`,
 notes:`Crucial untuk trust. Audience coder skeptis sama hype. Tunjukkan kamu rasional — akui kelemahan. Kejujuran ini yang bikin mereka percaya poin positifnya.`},

{blk:3,bn:"BLOK 3 · HOW BLOCKCHAIN WORKS",cls:"",t:"What is a Blockchain",
 html:`<div class="eyebrow">Definisi Kerja</div>
   <h2 style="font-size:62px;max-width:1560px">Database bersama, hanya-bisa-ditambah, direplikasi ke banyak komputer, diamankan kriptografi</h2>
   <div class="row" style="margin-top:44px;gap:18px;flex-wrap:wrap">
     <div class="card" style="flex:1"><div class="k">Shared</div><p>Satu salinan kebenaran, dilihat semua orang.</p></div>
     <div class="card" style="flex:1"><div class="k">Append-only</div><p>Data ditambah, tidak dihapus/diubah.</p></div>
     <div class="card" style="flex:1"><div class="k">Replicated</div><p>Ribuan node simpan salinan identik.</p></div>
     <div class="card" style="flex:1"><div class="k">Cryptography</div><p>Hashing & signature jaga integritas.</p></div>
   </div>`,
 notes:`Bangun definisi ini kata per kata. Tanya: "kenapa append-only penting?" 4 kata kunci ini dipakai sepanjang sesi.`},

{blk:3,bn:"BLOK 3 · HOW BLOCKCHAIN WORKS",cls:"",t:"Buku Kas Digital",
 html:`<div class="eyebrow">Analogi · Buku Kas Bersama</div>
   <h2>Bayangkan satu buku kas,<br>difotokopi ke <span class="hl">jutaan orang</span></h2>
   <div class="row" style="margin-top:34px;gap:40px;align-items:center">
     <div style="flex:1.1">
       <div class="lead" style="margin-top:0">Blockchain itu <b>buku kas (ledger)</b> yang mencatat setiap transaksi. Tapi tidak disimpan di satu kantor bank — fotokopinya ada di jutaan orang di seluruh dunia.</div>
       <div class="callout" style="margin-top:30px">Setiap transaksi baru, semua orang harus <b>setuju</b> mencatatnya di buku masing-masing. Begitu tercatat, <b>coretan atau hapusan tidak diizinkan selamanya.</b></div>
     </div>
     <div style="flex:.9;display:flex;flex-direction:column;gap:16px">
       ${["Andi → Siti : 5 pulpen","Andi → Siti : 5 pulpen","Andi → Siti : 5 pulpen"].map((t,i)=>`<div class="card" style="padding:20px 26px"><div class="k" style="margin-bottom:8px">📒 Salinan #${i+1}</div><p style="font-family:var(--mono);color:#cfd6f5;font-size:22px">${t}</p></div>`).join("")}
       <div class="small" style="text-align:center">…dan jutaan salinan identik lainnya</div>
     </div>
   </div>`,
 notes:`Analogi paling gampang dicerna. Tekankan 2 sifat: (1) semua harus setuju sebelum dicatat, (2) sekali dicatat tak bisa diubah. Ini fondasi "kenapa blockchain bisa dipercaya tanpa bank".`},

{blk:3,bn:"BLOK 3 · HOW BLOCKCHAIN WORKS",cls:"",t:"4 Fungsi Utama",
 html:`<div class="eyebrow">Kenapa Ini Berguna</div>
   <h2>4 fungsi utama blockchain</h2>
   <div class="grid g2" style="margin-top:36px">
     <div class="card"><div class="k">✓ Verifikasi Otomatis</div><p>Menghilangkan "orang tengah" (bank/notaris) untuk membuktikan sebuah transaksi sah.</p></div>
     <div class="card"><div class="k">🔒 Keamanan Tinggi</div><p>Memakai matematika rumit (kriptografi) sehingga hampir mustahil diretas atau dipalsukan.</p></div>
     <div class="card"><div class="k">🕓 Rekam Jejak Abadi</div><p>Sekali masuk, data tidak bisa diubah/dihapus — menciptakan bukti sejarah yang jujur.</p></div>
     <div class="card accent"><div class="k">⚡ Transaksi Instan</div><p>Kirim aset ke mana pun di dunia dalam hitungan detik, tanpa birokrasi atau jam operasional bank.</p></div>
   </div>`,
 notes:`4 fungsi ini adalah "value proposition" blockchain. Hubungkan tiap poin ke contoh: verifikasi otomatis = smart contract; rekam jejak abadi = demo tamper-chain berikutnya.`},

{blk:3,bn:"BLOK 3 · HOW BLOCKCHAIN WORKS",cls:"",t:"Apa itu Hashing?",
 html:`<div class="eyebrow">Sebelum Demo · Konsep Hashing</div>
   <h2 style="font-size:60px">Apa itu Hashing? <span class="hl">≠ Enkripsi</span></h2>
   <div class="lead" style="max-width:1500px;margin-top:8px;font-size:27px">Hashing = fungsi <b>satu-arah</b> yang mengubah data apa pun (teks, file, transaksi) menjadi <b>sidik jari berukuran tetap</b>. SHA-256 selalu menghasilkan 256-bit = 64 karakter hex, berapa pun panjang input.</div>
   <div class="grid g2" style="margin-top:24px">
     <div class="card" style="padding:24px 28px"><div class="k">🔒 Enkripsi · dua arah ↔</div><p style="font-size:22px">Tujuan: <b>kerahasiaan</b>. Data diacak agar tak terbaca, lalu <b>bisa dikembalikan</b> (decrypt) dengan kunci yang benar.<br><span class="small">Contoh: chat terenkripsi, HTTPS.</span></p></div>
     <div class="card accent" style="padding:24px 28px"><div class="k">👆 Hashing · satu arah →</div><p style="font-size:22px">Tujuan: <b>verifikasi & sidik jari</b>. <b>Tidak bisa dikembalikan</b> ke data asli — dipakai membuktikan data tidak diubah.<br><span class="small">Contoh: integritas block, cek password.</span></p></div>
   </div>
   <div class="card" style="margin-top:22px;padding:22px 30px">
     <div class="k">⚙️ Cara kerja SHA-256 (sederhana)</div>
     <div class="row" style="gap:0;align-items:stretch;margin-top:10px">
       ${[["1","Ubah ke biner","Input jadi deretan bit 0 / 1."],["2","Pecah jadi blok","Diproses per blok 512-bit."],["3","Aduk 64 ronde","Campur bit pakai AND · OR · XOR · NOT · rotasi · geser, lalu jumlah mod 2³²."],["4","Output tetap","Selalu 256-bit (64 hex)."]].map((s,i,a)=>`<div style="flex:1;padding:0 14px"><div class="num">STEP ${s[0]}</div><div style="font-size:20px;font-weight:600;color:#fff;margin:10px 0 4px">${s[1]}</div><div style="font-size:17px;color:var(--muted);line-height:1.35">${s[2]}</div></div>${i<a.length-1?'<div style="color:var(--accent);font-size:22px;display:flex;align-items:center">→</div>':''}`).join("")}
     </div>
     <div class="bitrow">
       <span class="bitchip"><span class="op">AND</span>1100 &amp; 1010 = <b>1000</b></span>
       <span class="bitchip"><span class="op">OR</span>1100 | 1010 = <b>1110</b></span>
       <span class="bitchip"><span class="op">XOR</span>1100 ^ 1010 = <b>0110</b></span>
       <span class="bitchip" style="border-color:color-mix(in srgb,var(--yellow) 50%,transparent);color:#fff">⚡ Avalanche: ubah 1 bit input → ~separuh bit output ikut berubah</span>
     </div>
   </div>`,
 notes:`Jembatan ke demo live. Poin kunci: hashing ≠ enkripsi — enkripsi DUA arah (bisa dibalik dengan kunci), hashing SATU arah (tak bisa dibalik). SHA-256 mengaduk bit input berkali-kali dengan operasi logika (AND/OR/XOR/rotasi/geser) sampai jadi 256-bit yang acak tapi deterministik. Tekankan avalanche — itu yang langsung mereka lihat di slide berikutnya. Jangan terjebak detail matematis; cukup intuisi "aduk bit berulang sampai tak bisa ditebak balik". Analogi: blender — gampang ngeblender buah jadi jus, mustahil mengembalikan jus jadi buah utuh.`},

{blk:3,bn:"BLOK 3 · HOW BLOCKCHAIN WORKS",cls:"",t:"Hashing 101 · LIVE",
 html:`<div class="eyebrow">Rahasia Keamanan · Hash · Live Demo</div>
   <h2 style="font-size:58px">Ketik apa saja — lihat <span class="hl">SHA-256</span> bekerja</h2>
   <div class="lab" style="margin-top:26px">
     <label class="lbl">Input</label>
     <input class="field" id="hashIn" value="BlockDev" autocomplete="off" spellcheck="false">
     <label class="lbl" style="margin-top:26px">SHA-256 Output (256-bit · 64 hex)</label>
     <div class="hashout" id="hashOut"></div>
     <div class="props">
       <span class="tag"><span class="dot"></span> Deterministic</span>
       <span class="tag"><span class="dot"></span> One-way</span>
       <span class="tag"><span class="dot"></span> Avalanche effect</span>
     </div>
     <div class="aval" id="avalMsg" style="margin-top:18px"></div>
   </div>
   <div class="callout" style="margin-top:22px">Ubah <b>satu huruf</b> saja — seluruh hash berubah total. Hash = "sidik jari" data yang panjangnya selalu tetap.</div>`,
 notes:`Demo inti. Tambah/hapus 1 huruf, tunjuk avalanche: hash berubah total tapi panjang tetap 64 hex. Ini hash beneran, dihitung di browser. Deterministic + one-way.`,
 init:"hasher"},

{blk:3,bn:"BLOK 3 · HOW BLOCKCHAIN WORKS",cls:"",t:"Linking Blocks · TAMPER",
 html:`<div class="eyebrow">The "Chain" · Coba Curangi & Perbaiki</div>
   <h2 style="font-size:54px">Tiap block menyimpan <span class="hl">hash block sebelumnya</span></h2>
   <div class="chain" id="chain"></div>
   <div class="chainmsg" id="chainMsg"></div>
   <div class="callout" style="margin-top:16px">Edit data sebuah block → hash-nya berubah → block sesudahnya <span style="color:var(--red)">putus</span>. Untuk memperbaiki, kamu harus tekan <b>⛏ Mine</b> di tiap block <b>satu per satu</b> dari kiri ke kanan. Itulah kenapa mengubah masa lalu = mahal & praktis mustahil.</div>`,
 notes:`MOMEN AHA — pelan. Edit data Block #1 di depan mereka → Block #2 & #3 langsung merah. Lalu tunjukkan: harus Mine #1, baru #2, baru #3 — satu per satu. Tanya: "kalau penyerang mau ubah transaksi lama, dia harus mine ulang SEMUA block sesudahnya, lebih cepat dari seluruh jaringan." Praktis mustahil.`,
 init:"chain"},

{blk:3,bn:"BLOK 3 · HOW BLOCKCHAIN WORKS",cls:"",t:"Merkle Tree",
 html:`<div class="eyebrow">Sekilas · Tidak Mendalam</div>
   <h2>Merkle Tree — cara block <span class="hl">meringkas</span> ribuan transaksi</h2>
   <div class="lead" style="max-width:1340px">Semua transaksi di-hash berpasangan ke atas sampai jadi satu <span class="en">root hash</span>. Cukup simpan 1 root untuk memverifikasi ribuan transaksi.</div>
   <div class="row" style="margin-top:40px;gap:24px">
     <div class="card" style="flex:1"><div class="k">tx → leaf hash</div><p>Tiap transaksi punya hash sendiri.</p></div>
     <div class="card" style="flex:1"><div class="k">pasangkan & hash</div><p>Dua hash digabung lalu di-hash lagi.</p></div>
     <div class="card accent" style="flex:1"><div class="k">Merkle root</div><p>Satu hash mewakili seluruh isi block.</p></div>
   </div>`,
 notes:`Jangan deep-dive. Cukup namanya + intuisi "ringkasan efisien". Slide paling aman dipotong kalau waktu mepet.`},

{blk:3,bn:"BLOK 3 · HOW BLOCKCHAIN WORKS",cls:"",t:"Consensus Problem",
 html:`<div class="eyebrow">Masalah Sesungguhnya</div>
   <h2>Tanpa bos, <span class="hl">siapa</span> yang menulis block berikutnya?</h2>
   <div class="lead" style="max-width:1380px">Ribuan komputer di seluruh dunia, semua ingin menambah block. Mereka harus <b>sepakat</b> pada satu versi sejarah — tanpa saling percaya, tanpa koordinator pusat.</div>`,
 notes:`Lempar pertanyaan, JANGAN langsung jawab. Tunggu 2-3 tebakan. Bikin PoW/PoS terasa seperti "jawaban", bukan teori kering.`},

{blk:3,bn:"BLOK 3 · HOW BLOCKCHAIN WORKS",cls:"",t:"Proof of Work",
 html:`<div class="eyebrow">Jawaban #1 · Bitcoin</div>
   <h2>Proof of Work — <span class="hl">buktikan kerja keras</span></h2>
   <div class="grid g2" style="margin-top:36px">
     <div class="card"><div class="k">Cara kerja</div><p>Miner berlomba menyelesaikan teka-teki matematis yang mahal. Pemenang berhak menulis block & dapat reward.</p></div>
     <div class="card accent"><div class="k">Keamanan</div><p>Untuk menyerang butuh <b>51% daya komputasi</b> dunia — praktis mustahil & sangat mahal.</p></div>
   </div>
   <div class="callout warn" style="margin-top:30px;border-left-color:var(--red)">Trade-off: <b>boros listrik.</b> Konsumsi energi Bitcoin setara satu negara berukuran sedang.</div>`,
 notes:`Beri angka: konsumsi listrik Bitcoin ~ setara Norwegia/Argentina. Akui trade-off. Jembatan: "Ethereum pilih jalan berbeda."`},

{blk:3,bn:"BLOK 3 · HOW BLOCKCHAIN WORKS",cls:"",t:"Proof of Stake",
 html:`<div class="eyebrow">Jawaban #2 · Ethereum (sejak 2022)</div>
   <h2>Proof of Stake — <span class="hl">pertaruhkan modal</span></h2>
   <div class="grid g2" style="margin-top:36px">
     <div class="card"><div class="k">Cara kerja</div><p>Validator <span class="en">stake</span> 32 ETH sebagai jaminan, dipilih acak mengusulkan block. Jujur → reward. Curang → <span class="en">slashed</span> (ETH dipotong).</p></div>
     <div class="card accent"><div class="k">Keamanan</div><p>Menyerang butuh 51% ETH yang di-stake (puluhan miliar dolar) — dan kamu kehilangan semuanya kalau gagal.</p></div>
   </div>
   <div class="callout" style="margin-top:30px;border-left-color:var(--green)"><b>~99% lebih hemat energi</b> dari PoW. Ethereum sudah pindah ke PoS lewat "The Merge" (2022).</div>`,
 notes:`Luruskan MISCONCEPTION: sejak The Merge 2022, Ethereum PoS, hemat ~99%. Analogi: PoW bakar listrik untuk "berhak"; PoS pertaruhkan uang yang hangus kalau curang.`},

{blk:3,bn:"BLOK 3 · HOW BLOCKCHAIN WORKS",cls:"top",t:"Cara Kerja Blockchain",
 html:`<div class="eyebrow">Rangkuman Alur</div>
   <h2>Dari klik "Send" sampai jadi sejarah permanen</h2>
   <div class="row" style="margin-top:50px;gap:0;align-items:stretch;flex-wrap:nowrap">
     ${[["1","Pengiriman","Budi kirim uang/data ke Ani."],["2","Mempool","Transaksi mengantri di ruang tunggu."],["3","Pemeriksaan","Diverifikasi ribuan pihak sedunia."],["4","Pengelompokan","Disusun bersama tx lain jadi satu Blok."],["5","Penyusunan Rantai","Blok dirantai ke blok sebelumnya."]].map((s,i,a)=>`<div class="card" style="flex:1;padding:26px 22px"><div class="num">STEP ${s[0]}</div><h3 style="margin:14px 0 10px;font-size:25px">${s[1]}</h3><p style="font-size:20px">${s[2]}</p></div>${i<a.length-1?'<div style="color:var(--accent);font-size:28px;display:flex;align-items:center;padding:0 8px">→</div>':''}`).join("")}
   </div>`,
 notes:`Recap aktif — JANGAN kamu yang ngomong semua. Tunjuk 2-3 orang acak. Kalau ada yang macet, itu sinyal harus diulang. Alur 5 langkah ini = sintesis BLOK 3.`},

{blk:4,bn:"BLOK 4 · ETHEREUM SPECIFICS",cls:"",t:"Bitcoin vs Ethereum",
 html:`<div class="eyebrow">Transisi Penting</div>
   <h2>Bitcoin vs Ethereum</h2>
   <div class="grid g2" style="margin-top:40px">
     <div class="card"><div class="k">Bitcoin</div><h3 style="margin-bottom:14px;font-size:38px">Digital Gold</h3><p>Penyimpan nilai, scripting terbatas. Fokus: uang yang aman & langka.</p><p style="margin-top:18px;color:var(--dim)">Analogi: <b>kalkulator</b> — hebat untuk satu hal.</p></div>
     <div class="card accent"><div class="k">Ethereum</div><h3 style="margin-bottom:14px;font-size:38px">World Computer</h3><p>Blockchain yang <b>programmable</b> — kamu bisa jalankan kode (smart contract) di atasnya.</p><p style="margin-top:18px;color:var(--dim)">Analogi: <b>komputer</b> — bisa jalankan aplikasi apa saja.</p></div>
   </div>`,
 notes:`Transisi kenapa kita pakai Ethereum untuk membangun dApp. Kunci: programmable. Bitcoin = kalkulator, Ethereum = komputer. Ini unlock semua sesi berikutnya.`},

{blk:4,bn:"BLOK 4 · ETHEREUM SPECIFICS",cls:"",t:"The EVM",
 html:`<div class="eyebrow">Mesin di Balik dApp</div>
   <h2>EVM — <span class="hl">Ethereum Virtual Machine</span></h2>
   <div class="row" style="margin-top:40px;gap:0;align-items:center">
     <div class="card" style="flex:1"><div class="k">Kode Solidity</div><p>Kamu tulis smart contract.</p></div>
     <div style="color:var(--accent);padding:0 18px;font-size:30px">→</div>
     <div class="card" style="flex:1"><div class="k">Bytecode</div><p>Di-compile jadi instruksi EVM.</p></div>
     <div style="color:var(--accent);padding:0 18px;font-size:30px">→</div>
     <div class="card accent" style="flex:1"><div class="k">Jalan di tiap node</div><p>EVM yang sama di seluruh dunia → hasil identik.</p></div>
   </div>
   <div class="callout" style="margin-top:44px">Familiar dengan <span class="en">JVM</span> atau <span class="en">Docker</span>? Konsepnya mirip: satu mesin abstrak, eksekusi <b>deterministik</b> di mana pun. Itulah kenapa semua node setuju hasilnya.</div>`,

/* ============ RENDER ============ */
const stage=document.getElementById('stage');
SLIDES.forEach((s,i)=>{
  const el=document.createElement('section');
  el.className='slide blk'+s.blk+(s.cls?(' '+s.cls):'');
  el.dataset.i=i; el.innerHTML=s.html; stage.appendChild(el); s._el=el;
});
const slides=[...document.querySelectorAll('.slide')];

let cur=0;
function show(n){
  n=Math.max(0,Math.min(slides.length-1,n));
  slides.forEach((el,i)=>{el.classList.remove('active','prev'); if(i<n)el.classList.add('prev');});
  slides[n].classList.add('active'); cur=n;
  document.getElementById('prog').style.width=(n/(slides.length-1)*100)+'%';
  document.getElementById('count').textContent=String(n+1).padStart(2,'0')+' / '+String(slides.length).padStart(2,'0')+'  ·  '+SLIDES[n].bn;
  updatePresenter();
}
function next(){show(cur+1);} function prev(){show(cur-1);}

function scale(){document.documentElement.style.setProperty('--s',Math.min(window.innerWidth/1920,window.innerHeight/1080));}
window.addEventListener('resize',scale); scale();

/* keys — ONLY arrows navigate; all shortcuts ignored while typing in a field */
function editable(el){return el&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA'||el.isContentEditable);}
document.addEventListener('keydown',e=>{
  if(editable(e.target)) return;          // typing in chain/hasher: never hijack keys
  if(e.key==='ArrowRight'){e.preventDefault();next();}
  else if(e.key==='ArrowLeft'){e.preventDefault();prev();}
  else if(e.key==='f'||e.key==='F'){toggleFs();}
  else if(e.key==='p'||e.key==='P'){togglePres();}
  else if(e.key==='o'||e.key==='O'){toggleOv();}
  else if(e.key==='Escape'){document.getElementById('overview').classList.remove('on');}
});
function toggleFs(){ if(!document.fullscreenElement){document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();} else {document.exitFullscreen&&document.exitFullscreen();} }

setTimeout(()=>document.getElementById('hint').classList.add('hide'),5200);
document.addEventListener('mousemove',()=>{const h=document.getElementById('hint');h.classList.remove('hide');clearTimeout(h._t);h._t=setTimeout(()=>h.classList.add('hide'),2600);});

/* presenter */
const pres=document.getElementById('presenter');
function togglePres(){pres.classList.toggle('on');updatePresenter();}
function updatePresenter(){
  if(!pres.classList.contains('on'))return;
  document.getElementById('pnotes').innerHTML='<h4>Catatan Pembicara · '+SLIDES[cur].t+'</h4>'+(SLIDES[cur].notes||'—');
  const nx=SLIDES[cur+1];
  document.getElementById('pnext').innerHTML=nx?('Berikutnya → <b>'+nx.t+'</b>'):'<b>Slide terakhir</b>';
}
let tEl=document.getElementById('ptimer'),tSec=0,tInt=null;
function tFmt(s){const h=Math.floor(s/3600),m=Math.floor(s%3600/60),x=s%60;return (h>0?h+':':'')+String(m).padStart(2,'0')+':'+String(x).padStart(2,'0');}
document.getElementById('tstart').onclick=()=>{if(!tInt)tInt=setInterval(()=>{tSec++;tEl.textContent=tFmt(tSec);},1000);};
document.getElementById('tpause').onclick=()=>{clearInterval(tInt);tInt=null;};
document.getElementById('treset').onclick=()=>{clearInterval(tInt);tInt=null;tSec=0;tEl.textContent='00:00';};

/* overview */
const ov=document.getElementById('overview'),ovg=document.getElementById('ovgrid');
SLIDES.forEach((s,i)=>{const c=document.createElement('div');c.className='ovcard';
  c.innerHTML='<div class="on-i">'+String(i+1).padStart(2,'0')+'</div><div class="ot">'+s.t+'</div><div class="ob">'+s.bn+'</div>';
  c.onclick=()=>{show(i);ov.classList.remove('on');};ovg.appendChild(c);});
function toggleOv(){ov.classList.toggle('on');}

/* ============ hasher ============ */
(function(){
  const inp=document.getElementById('hashIn'),out=document.getElementById('hashOut'),msg=document.getElementById('avalMsg');
  if(!inp)return; let last='';
  function render(){
    const h=h256(inp.value); let html='';
    for(let i=0;i<h.length;i++){const ch=h[i];const ch2=last&&last[i]!==ch;html+='<span'+(ch2?' class="changed"':'')+'>'+ch+'</span>';}
    out.innerHTML=html;
    if(last){let d=0;for(let i=0;i<h.length;i++)if(last[i]!==h[i])d++;msg.innerHTML='Avalanche: <b>'+d+' dari 64</b> karakter hex berubah ('+Math.round(d/64*100)+'%) — meski input cuma berubah sedikit.';}
    else msg.textContent='Ketik atau ubah satu huruf di atas untuk melihat efeknya.';
    last=h;
  }
  inp.addEventListener('input',render); render(); last=h256(inp.value);
})();

/* ============ tamper chain — 3 blocks, per-block mine ============ */
(function(){
  const wrap=document.getElementById('chain');if(!wrap)return;
  const GEN='0'.repeat(64);
  let blocks=[{i:1,data:'Alice → Bob: 10'},{i:2,data:'Bob → Carol: 4'},{i:3,data:'Carol → Dave: 2'}];
  let baseline=[];
  function hashOf(b){return h256(b.i+'|'+b.data+'|'+b.prev);}
  function shrt(h){return h.slice(0,12)+'…'+h.slice(-8);}
  function mineAll(){let p=GEN;blocks.forEach(b=>{b.prev=p;p=hashOf(b);});baseline=blocks.map(hashOf);}
  function mineOne(idx){blocks[idx].prev=idx===0?GEN:hashOf(blocks[idx-1]);baseline[idx]=hashOf(blocks[idx]);render();}
  function render(){
    const cur=blocks.map(hashOf);
    const red=[]; red[0]=(blocks[0].prev!==GEN);
    for(let i=1;i<blocks.length;i++) red[i]=(blocks[i].prev!==cur[i-1])||red[i-1];
    wrap.innerHTML='';
    blocks.forEach((b,idx)=>{
      const broken=red[idx], changed=cur[idx]!==baseline[idx], head=changed&&!broken;
      const cls=broken?'broken':(head?'head':'valid');
      const badge=broken?'PUTUS':(head?'DIUBAH':'VALID');
      const el=document.createElement('div'); el.className='block '+cls;
      el.innerHTML='<div class="bh"><span class="bidx">Block #'+b.i+'</span><span class="badge">'+badge+'</span></div>'+
        '<div class="lab2">Data (klik & ubah)</div><input class="dinput" value="'+b.data.replace(/"/g,'&quot;')+'" data-idx="'+idx+'">'+
        '<div class="lab2">Prev hash (tersimpan)</div><div class="mono">'+shrt(b.prev)+'</div>'+
        '<div class="lab2">Hash block ini</div><div class="mono hashv">'+shrt(cur[idx])+'</div>'+
        '<button class="mine" data-mine="'+idx+'">⛏ Mine block ini</button>';
      wrap.appendChild(el);
      if(idx<blocks.length-1){const c=document.createElement('div');c.className='connector'+(red[idx+1]?' broken':'');c.textContent='⛓';wrap.appendChild(c);}
    });
    wrap.querySelectorAll('.dinput').forEach(inp=>inp.addEventListener('input',e=>{
      blocks[+e.target.dataset.idx].data=e.target.value; render();
      const t=wrap.querySelector('.dinput[data-idx="'+e.target.dataset.idx+'"]');
      if(t){t.focus();const v=t.value;t.setSelectionRange(v.length,v.length);}
    }));
    wrap.querySelectorAll('.mine').forEach(btn=>btn.onclick=()=>mineOne(+btn.dataset.mine));
    const anyRed=red.some(Boolean), anyChanged=blocks.some((b,i)=>cur[i]!==baseline[i]);
    document.getElementById('chainMsg').innerHTML=anyRed
      ?'<b style="color:var(--red)">Rantai putus.</b> Tekan ⛏ Mine dari block paling kiri yang bermasalah, satu per satu, untuk menyambung ulang.'
      :(anyChanged?'<b style="color:var(--yellow)">Block diubah.</b> Tekan ⛏ Mine pada block itu untuk menjadikannya versi sah yang baru.'
        :'Rantai sinkron — tiap block menunjuk hash block sebelumnya dengan benar.');
  }
  mineAll(); render();
})();

  const F=[

   {k:'to',v:'"0x7Be2…F0a9"',t:'Tujuan',d:'Alamat penerima — bisa EOA lain (transfer) atau alamat smart contract (interaksi).'},

   {k:'maxFeePerGas',v:'"22 gwei"',t:'Harga Gas (EIP-1559)',d:'Harga maksimum per unit gas yang bersedia kamu bayar (base fee + tip). Menentukan biaya akhir.'},
   {k:'nonce',v:'7',t:'Nonce',d:'Nomor urut transaksi dari akun ini. Mencegah replay & menjamin urutan. Tx ke-8 dari akunmu → nonce 7.'},
   {k:'signature',v:'"0x…(r,s,v)"',t:'Tanda Tangan',d:'Bukti kriptografis bahwa pemilik private key menyetujui transaksi ini — tanpa mengungkap kuncinya. Inti keamanan Ethereum.'}
  ];
  jw.innerHTML='<span class="fp">{</span><br>'+F.map((f,i)=>'<div class="frow" data-i="'+i+'">&nbsp;&nbsp;<span class="fk">"'+f.k+'"</span><span class="fp">:</span> <span class="fv">'+f.v+'</span><span class="fp">,</span></div>').join('')+'<span class="fp">}</span>';
  function sel(i){jw.querySelectorAll('.frow').forEach(r=>r.classList.toggle('on',+r.dataset.i===i));
    const f=F[i];iw.innerHTML='<div class="ik">'+f.k+'</div><h3>'+f.t+'</h3><p>'+f.d+'</p><div class="hint">Klik field lain untuk menjelajah →</div>';}
  jw.querySelectorAll('.frow').forEach(r=>r.onclick=()=>sel(+r.dataset.i));
  sel(3);

/* ============ gas calc ============ */
(function(){
  const pr=document.getElementById('gasPresets');if(!pr)return;
  const PRE=[['Transfer ETH',21000],['Kirim ERC-20',65000],['Mint NFT',85000],['Swap DeFi',150000]];
  let gasUnits=21000;
  PRE.forEach((p,i)=>{const b=document.createElement('div');b.className='preset'+(i===0?' on':'');
    b.textContent=p[0]+' · '+p[1].toLocaleString('en');b.onclick=()=>{gasUnits=p[1];
      pr.querySelectorAll('.preset').forEach(x=>x.classList.remove('on'));b.classList.add('on');calc();};pr.appendChild(b);});
  const base=document.getElementById('baseFee'),prio=document.getElementById('prioFee'),eth=document.getElementById('ethPrice');
  function calc(){
    const bf=+base.value,pf=+prio.value,ep=+eth.value;
    document.getElementById('baseV').textContent=bf+' gwei';
    document.getElementById('prioV').textContent=pf+' gwei';
    document.getElementById('ethV').textContent='$'+ep.toLocaleString('en');
    const feeEth=gasUnits*(bf+pf)/1e9, feeUsd=feeEth*ep;
    document.getElementById('feeEth').textContent=feeEth.toFixed(6)+' ETH';
    document.getElementById('feeUsd').textContent='$'+feeUsd.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
  }
  [base,prio,eth].forEach(s=>s.addEventListener('input',calc)); calc();
})();

show(0);
